<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback</title>
    <link rel="stylesheet" href="assests/feed.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- AOS CSS -->
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>

<body>
    <div class="container-fluid">

        <div id="nav-bar" data-aos="fade-down" data-aos-duration="1000"></div>

        <div class="container mt-5 mb-5">
            <div class="row g-4 align-items-center">
                <!-- Feedback Form -->
                <div class="col-lg-6" data-aos="fade-right" data-aos-duration="1200">
                    <div class="feedback-container h-100">
                        <h2 class="text-center mb-4" data-aos="zoom-in" data-aos-delay="200">Feedback</h2>

                        <div id="thankYouMsg" class="alert alert-success d-none text-center" data-aos="fade-up">
                            ✅ Thank you for your feedback!
                        </div>

                        <form id="feedbackForm" novalidate>
                            <label for="name" data-aos="fade-right">Name</label>
                            <input type="text" id="name" placeholder="Your name" pattern="^[A-Za-z\s]+$" required data-aos="fade-left">
                            <div class="invalid-feedback">Please enter a valid name (letters only).</div>

                            <label for="email" data-aos="fade-right">Email</label>
                            <input type="email" id="email" placeholder="Your email" required data-aos="fade-left">
                            <div class="invalid-feedback">Please enter a valid email address.</div>

                            <label for="message" data-aos="fade-right">Message</label>
                            <textarea id="message" placeholder="Write your feedback here..." rows="5"
                                required data-aos="fade-left"></textarea>
                            <div class="invalid-feedback">Please write your feedback.</div>

                            <button type="submit" class="bg-dark" data-aos="zoom-in" data-aos-delay="200">Submit</button>
                        </form>
                    </div>
                </div>

                <!-- Video Section -->
                <div class="col-lg-6" data-aos="fade-left" data-aos-duration="1200">
                    <div class="video-container h-100" data-aos="zoom-in">
                        <video autoplay muted loop class="feedback-video">
                            <source src="video/4380323-hd_1080_1920_30fps.mp4" type="video/mp4">
                            Your browser does not support the video tag.
                        </video>
                    </div>
                </div>
            </div>
        </div>

        <div id="foot" data-aos="fade-up" data-aos-duration="1000"></div>
    </div>


    <script>
        document.getElementById('feedbackForm').addEventListener('submit', function (e) {
            e.preventDefault();
            let valid = true;

            const name = document.getElementById('name');
            const namePattern = /^[A-Za-z\s]+$/;
            if (!namePattern.test(name.value.trim())) {
                name.classList.add('is-invalid');
                valid = false;
            } else {
                name.classList.remove('is-invalid');
            }

            const email = document.getElementById('email');
            if (!email.checkValidity()) {
                email.classList.add('is-invalid');
                valid = false;
            } else {
                email.classList.remove('is-invalid');
            }

            const message = document.getElementById('message');
            if (message.value.trim() === '') {
                message.classList.add('is-invalid');
                valid = false;
            } else {
                message.classList.remove('is-invalid');
            }

            if (valid) {
                document.getElementById('feedbackForm').reset();
                document.getElementById('thankYouMsg').classList.remove('d-none');
                setTimeout(() => {
                    document.getElementById('thankYouMsg').classList.add('d-none');
                }, 5000);
            }
        });
    </script>

    <style>
        .is-invalid {
            border: 2px solid red;
        }

        .invalid-feedback {
            display: none;
            color: red;
            font-size: 0.9rem;
        }

        .is-invalid+.invalid-feedback {
            display: block;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="assests/js/header.js"></script>
    <script src="assests/js/footer.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <script>
        AOS.init();
    </script>
</body>

</html>
