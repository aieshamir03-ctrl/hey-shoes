<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Now</title>
  <link rel="stylesheet" href="assests/order.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- AOS CSS -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>

<body>
  <div class="container-fluid">
    <div class="row" id="nav-bar"></div>

    <div class="container py-5">
      <div class="row g-4">
        <!-- Product Image -->
        <div class="col-md-5 text-center" data-aos="fade-right" data-aos-duration="1200">
          <img src="" alt="Shoes" class="img-fluid shadow img mt-5">
        </div>

        <!-- Order Form -->
        <div class="col-md-7" data-aos="fade-left" data-aos-duration="1200">
          <div class="card shadow p-4" data-aos="zoom-in" data-aos-delay="200">
            <h3 class="mb-4 text-center" data-aos="fade-down">Order Your Shoes</h3>
            
            <form id="orderForm" class="needs-validation" novalidate>
              
              <div class="mb-3" data-aos="fade-up" data-aos-delay="100">
                <label for="sizeSelect" class="form-label fw-bold">Select Shoe Size</label>
                <select id="sizeSelect" class="form-select" required>
                  <option value="">-- Choose Size --</option>
                </select>
                <div class="invalid-feedback">Please select a shoe size.</div>
              </div>

              <div class="mb-3" data-aos="fade-up" data-aos-delay="200">
                <label class="form-label fw-bold">Full Name</label>
                <input type="text" class="form-control" id="name" required>
                <div class="invalid-feedback">Name is required.</div>
              </div>

              <div class="mb-3" data-aos="fade-up" data-aos-delay="300">
                <label class="form-label fw-bold">Email Address</label>
                <input type="email" class="form-control" id="email" required>
                <div class="invalid-feedback">Enter a valid email address.</div>
              </div>

              <div class="mb-3" data-aos="fade-up" data-aos-delay="400">
                <label class="form-label fw-bold">Contact No</label>
                <input type="tel" class="form-control" id="contact" required pattern="[0-9]{10,15}">
                <div class="invalid-feedback">Enter a valid contact number (10-15 digits).</div>
              </div>

              <div class="mb-3" data-aos="fade-up" data-aos-delay="500">
                <label class="form-label fw-bold">Shipping Address</label>
                <textarea class="form-control" id="address" rows="2" required></textarea>
                <div class="invalid-feedback">Address is required.</div>
              </div>

              <div class="d-grid" data-aos="zoom-in" data-aos-delay="600">
                <button type="submit" class="btn btn-dark btn-lg" id="submitBtn">Order Now</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
    
    <div class="row" id="bag"></div>
    <div class="row" id="foot"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assests/js/header.js"></script>
  <script src="assests/js/footer.js"></script>
  <script src="assests/order.css"></script>

  <!-- AOS JS -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init();

    const shoeSizes = [
      { age: "0-3 months", size: 16 }, { age: "3-6 months", size: 17 }, { age: "6-9 months", size: 18 },
      { age: "9-12 months", size: 19 }, { age: "1 year", size: 20 }, { age: "1.5 years", size: 21 },
      { age: "2 years", size: 22 }, { age: "2-3 years", size: 23 }, { age: "3 years", size: 24 },
      { age: "3-4 years", size: 25 }, { age: "4 years", size: 26 }, { age: "4-5 years", size: 27 },
      { age: "5 years", size: 28 }, { age: "5-6 years", size: 29 }, { age: "6-7 years", size: 30 },
      { age: "7 years", size: 31 }, { age: "7-8 years", size: 32 }, { age: "8-9 years", size: 33 },
      { age: "9-10 years", size: 34 }, { age: "10-11 years", size: 35 }, { age: "11-12 years", size: 36 },
      { age: "12-13 years", size: 37 }, { age: "13-14 years", size: 38 }, { age: "15-16 years", size: 39 },
      { age: "17-18 years", size: 40 }, { age: "19-20 years", size: 41 }, { age: "21-25 years", size: 42 },
      { age: "26-30 years", size: 43 }, { age: "31-35 years", size: 44 }, { age: "36-40 years", size: 45 },
      { age: "41-45 years", size: 46 }, { age: "46-50 years", size: 47 }, { age: "46-50 years", size: 48 }
    ];

    const sizeSelect = document.getElementById('sizeSelect');
    shoeSizes.forEach(item => {
      const o = document.createElement('option');
      o.value = item.size;
      o.textContent = `${item.size} (Age: ${item.age})`;
      sizeSelect.appendChild(o);
    });

    const urlParams = new URLSearchParams(window.location.search);
    const productImage = urlParams.get('image');
    const productName = urlParams.get('name');

    const orderImage = document.querySelector('.img-fluid');
    const orderTitle = document.querySelector('h3.mb-4');
    
    if (productImage) orderImage.src = productImage;
    if (productName) orderTitle.textContent = `Order Your ${productName}`;

    const form = document.getElementById('orderForm');
    form.addEventListener('submit', function (event) {
      event.preventDefault();
      event.stopPropagation();

      if (form.checkValidity()) {
        const userName = document.getElementById('name').value;
        alert(`✅ We received your order, ${userName}!`);
        form.reset(); 
        form.classList.remove('was-validated');
      } else {
        form.classList.add('was-validated');
      }
    });
  </script>
</body>
</html>
