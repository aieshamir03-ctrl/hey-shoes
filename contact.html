<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Contact Us</title>
  <link rel="stylesheet" href="assests/contact.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- AOS CSS -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>

<body>
  <div id="nav-bar"></div>

  <div class="container">
    <div class="left" data-aos="fade-right" data-aos-duration="1000">
      <h2>Contact Info</h2>
      <p><span>Address:</span> abc Center 8th Floor, Karachi Pakistan</p>
      <p><span>Let’s Talk:</span> <a href="tel:+9203001236879">+92 0300 1236879</a></p>
      <p><span>General Support:</span> <a href="mailto:contact@example.com">contact@example.com</a></p>
    </div>

    <div class="right" data-aos="fade-left" data-aos-duration="1000">
      <h2>Send Us A Message</h2>
      <form id="contactForm">
        <div class="form-group" data-aos="fade-up" data-aos-delay="100">
          <input type="text" id="firstName" placeholder="First Name" required>
          <input type="text" id="lastName" placeholder="Last Name" required>
        </div>
        <input type="email" id="email" placeholder="Email Address" required data-aos="fade-up" data-aos-delay="200">
        <br>
        <input type="text" id="phone" placeholder="Phone Number" required data-aos="fade-up" data-aos-delay="300">
        <br>
        <textarea id="message" rows="6" placeholder="Write your message here..." required data-aos="fade-up" data-aos-delay="400"></textarea>
        <button type="submit" id="button" data-aos="zoom-in" data-aos-delay="500">Submit</button>
      </form>
    </div>
  </div>

  <div class="container-fluid">
    <div class="row">
      <div class="col" data-aos="fade-up" data-aos-duration="1200">
        <iframe id="map"
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3619.3029561846906!2d67.14949697393611!3d24.887645744171916!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3eb33999ec8ecc87%3A0xda9cc5004c86e53f!2sMETRO%20Stargate%20Store%2C%20Karachi!5e0!3m2!1sen!2s!4v1758569570210!5m2!1sen!2s"
          width="100%" height="450" style="border:2px;" allowfullscreen="" loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </div>
    <div class="row" id="foot"></div>
  </div>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e) {
  e.preventDefault(); 

  let firstName = document.getElementById("firstName").value.trim();
  let lastName = document.getElementById("lastName").value.trim();
  let email = document.getElementById("email").value.trim();
  let phone = document.getElementById("phone").value.trim();
  let message = document.getElementById("message").value.trim();

  let namePattern = /^[A-Za-z\s]+$/;

  if (!namePattern.test(firstName)) {
    alert("❌ Please enter a valid First Name (letters only).");
    return;
  }

  if (!namePattern.test(lastName)) {
    alert("❌ Please enter a valid Last Name (letters only).");
    return;
  }

  let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailPattern.test(email)) {
    alert("❌ Please enter a valid Email Address.");
    return;
  }

  let phonePattern = /^[0-9]{10,13}$/;
  if (!phonePattern.test(phone)) {
    alert("❌ Please enter a valid Phone Number (10-13 digits).");
    return;
  }

  if (message.length < 10) {
    alert("❌ Message must be at least 10 characters long.");
    return;
  }

  alert("✅ Form submitted successfully!");
  document.getElementById("contactForm").reset();
});
</script>

  <!-- Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- AOS JS -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init();
  </script>

  <script src="assests/js/header.js"></script>
  <script src="assests/js/footer.js"></script>

</body>
</html>
